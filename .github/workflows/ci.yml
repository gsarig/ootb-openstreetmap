name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis (PHPStan + PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr
          coverage: none
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-v2-${{ runner.os }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            composer-v2-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: vendor/bin/phpstan analyse --no-progress --error-format=checkstyle | cs2pr
      - run: vendor/bin/phpcs --report=checkstyle | cs2pr

  js-build:
    name: JS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: build/
          retention-days: 1

  phpunit:
    name: PHPUnit Snapshot Tests
    runs-on: ubuntu-latest
    needs: js-build
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: build/
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli
          coverage: xdebug
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-v2-${{ runner.os }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            composer-v2-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: bash bin/install-wp-tests.sh wordpress_test wordpress wordpress 127.0.0.1 latest
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
      - run: vendor/bin/phpunit --coverage-clover=tests/phpunit/coverage/clover.xml
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
      - uses: actions/upload-artifact@v4
        with:
          name: phpunit-coverage
          path: tests/phpunit/coverage/
          retention-days: 7

  playwright:
    name: Playwright Smoke Test
    runs-on: ubuntu-latest
    needs: js-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: build/
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none
      - name: Install Composer dependencies for container
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: docker compose up -d
      - name: Wait for WordPress
        run: |
          until curl -sf http://localhost:8080/wp-login.php > /dev/null; do sleep 3; done
      - name: Debug container state
        run: |
          docker compose ps
          docker compose logs wordpress
          docker compose logs cli
      - run: bash scripts/wp-test-setup.sh
      - run: npx playwright test
        env:
          WP_BASE_URL: http://localhost:8080
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            tests/playwright/screenshots/
            test-results/
          retention-days: 7
      - if: always()
        run: docker compose down

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
