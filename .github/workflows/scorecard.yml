name: Scorecard

on:
  schedule:
    - cron: '30 1 * * 1'  # Every Monday at 01:30 UTC
  push:
    branches: [master]

# Restrict default token permissions; each job declares only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Upload SARIF results to GitHub Security tab
      id-token: write         # Publish results to OpenSSF API (public repos)
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://securityscorecards.dev (public repos only).
          publish_results: true

      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
