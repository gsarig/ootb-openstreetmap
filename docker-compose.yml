services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress_test
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:php8.1-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress_test
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/ootb-openstreetmap
      - ./docker/mu-plugins:/var/www/html/wp-content/mu-plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-login.php"]
      interval: 10s
      timeout: 5s
      retries: 12

  cli:
    image: wordpress:cli-php8.1
    restart: "no"
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress_test
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wp_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/ootb-openstreetmap
      - ./docker/php.ini:/usr/local/etc/php/conf.d/ootb-memory.ini
    entrypoint: ["tail", "-f", "/dev/null"]

  composer:
    image: composer:2
    restart: "no"
    profiles: ["tools"]
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    volumes:
      - .:/app
    working_dir: /app

  node:
    image: node:20-alpine
    restart: "no"
    profiles: ["tools"]
    volumes:
      - .:/app
    working_dir: /app

volumes:
  db_data:
  wp_data:
